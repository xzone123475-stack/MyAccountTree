<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />

  <style>
    @font-face {
      font-family: "SunflowerLocal";
      src: url("fonts/Sunflower-Medium.ttf") format("truetype");
      font-display: block;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
    }

    html {
      background: #d9ff2f;
    }

    body {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(
          ellipse at 50% 52%,
          rgba(255,255,255,0.96) 0%,
          rgba(255,255,255,0.95) 22%,
          rgba(255,255,255,0.82) 34%,
          rgba(255,255,255,0.40) 48%,
          rgba(217,255,47,0.00) 58%
        ),
        radial-gradient(
          ellipse at 43% 54%,
          rgba(255,255,255,0.35) 0%,
          rgba(255,255,255,0.16) 22%,
          rgba(255,255,255,0.00) 42%
        ),
        radial-gradient(
          ellipse at 57% 46%,
          rgba(255,255,255,0.22) 0%,
          rgba(255,255,255,0.10) 18%,
          rgba(255,255,255,0.00) 36%
        ),
        #d9ff2f;
    }

    canvas {
      display: block;
      background: transparent !important;
      touch-action: none;
    }

    #inputForm {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 85vw;
      max-width: 420px;
      z-index: 20;
      margin: 0;
    }

    #mainInput {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border: 1px solid #ccc;
      outline: none;
      background: #fff;
      border-radius: 0;

      font-family: "SunflowerLocal", sans-serif;
      font-size: 16px;
      line-height: 1.2;
      text-align: center;

      -webkit-appearance: none;
      appearance: none;
      -webkit-font-smoothing: antialiased;
    }

    #mainInput::placeholder {
      font-family: "SunflowerLocal", sans-serif;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>
  <form id="inputForm" action="javascript:void(0);">
    <input
      id="mainInput"
      type="text"
      placeholder="가장 기억에 남는 금액을 남겨보세요!"
      autocomplete="off"
      autocapitalize="off"
      autocorrect="off"
      spellcheck="false"
      enterkeyhint="done"
    />
  </form>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script src="firebase.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
