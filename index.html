<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <style>
    @font-face {
      font-family: "SunflowerLocal";
      src: url("fonts/Sunflower-Medium.ttf") format("truetype");
      font-display: block;
    }

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #fff;
    }

    body { position: fixed; inset: 0; }

    canvas { display: block; touch-action: none; }

    #ui {
      position: fixed;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      width: 90vw; max-width: 480px;
      z-index: 20;
    }

    #mainInput {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      font-family: "SunflowerLocal", sans-serif;
      font-size: 16px;
      text-align: center;
      box-sizing: border-box;
    }

    #speedBar {
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
    }

    .speedBtn {
      flex: 1;
      margin: 0 2px;
      padding: 6px 0;
      border: 1px solid #aaa;
      text-align: center;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }

    .active {
      background: #000;
      color: #fff;
    }
  </style>
</head>

<body>

<div id="ui">
  <input id="mainInput" type="text"
    placeholder="기억에 남는 금액을 남겨주세요!" />

  <div id="speedBar">
    <div class="speedBtn active" data-speed="1">1</div>
    <div class="speedBtn" data-speed="2">2</div>
    <div class="speedBtn" data-speed="3">3</div>
    <div class="speedBtn" data-speed="4">4</div>
    <div class="speedBtn" data-speed="5">5</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase.js"></script>
<script src="sketch.js"></script>

</body>
</html>
